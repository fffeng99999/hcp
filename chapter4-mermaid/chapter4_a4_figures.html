<!doctype html>

  <title>第四章架构图 A4 版</title>
  <style>
    :root {
      --ink: #1f2933;
      --line: #243447;
      --muted: #5b6773;
      --paper: #ffffff;
      --panel: #f7f9fb;
      --panel2: #eef4fa;
      --panel3: #f3f6f2;
      --panel4: #faf5ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #e8edf2;
      color: var(--ink);
      font-family: "Microsoft YaHei", "SimHei", "Noto Sans CJK SC", Arial, sans-serif;
    }
    .page {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto;
      background: var(--paper);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.16);
      page-break-after: always;
    }
    svg.figure {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #fff;
    }
    .title { font-size: 30px; font-weight: 700; fill: var(--ink); }
    .subtitle { font-size: 18px; fill: var(--muted); }
    .box-title { font-size: 21px; font-weight: 700; fill: var(--ink); }
    .box-text { font-size: 18px; fill: var(--ink); }
    .small { font-size: 16px; fill: var(--ink); }
    .tiny { font-size: 15px; fill: var(--ink); }
    .group-title { font-size: 22px; font-weight: 700; fill: var(--ink); }
    .caption { font-size: 17px; fill: var(--muted); }
    .group { fill: var(--panel); stroke: var(--line); stroke-width: 2; rx: 12; }
    .group2 { fill: var(--panel2); stroke: var(--line); stroke-width: 2; rx: 12; }
    .group3 { fill: var(--panel3); stroke: var(--line); stroke-width: 2; rx: 12; }
    .group4 { fill: var(--panel4); stroke: var(--line); stroke-width: 2; rx: 12; }
    .box { fill: #fff; stroke: var(--line); stroke-width: 2; rx: 8; }
    .soft { fill: #f9fbfd; stroke: var(--line); stroke-width: 2; rx: 8; }
    .arrow { stroke: var(--line); stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .dash { stroke: var(--line); stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    .line { stroke: var(--line); stroke-width: 2; fill: none; }
    .note { fill: #fffdf5; stroke: #8a6d3b; stroke-width: 2; rx: 8; }
    @media print {
      @page { size: A4 landscape; margin: 8mm; }
      body { background: #fff; }
      .page {
        width: 100%;
        margin: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
